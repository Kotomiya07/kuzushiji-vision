model_name: KuzushijiRecognizer
version: "1.0"

# モデルアーキテクチャの設定
architecture:
  backbone:
    type: "resnet50"
    pretrained: true
    freeze_layers: 2  # 最初の2層は固定
    output_layers: [2, 3, 4]  # 異なるスケールの特徴を使用

  feature_pyramid:
    in_channels: [512, 1024, 2048]  # ResNet50の各ステージの出力チャネル
    out_channels: 256
    num_levels: 3

  transformer:
    hidden_dim: 256
    nhead: 8
    dropout: 0.1
    activation: "gelu"
    
    encoder:
      num_layers: 6
      dim_feedforward: 1024
      attention_dropout: 0.1
      
    decoder:
      num_layers: 6
      dim_feedforward: 1024
      attention_dropout: 0.1
      max_sequence_length: 100  # 出力シーケンスの最大長
      vocab_size: 4000  # くずし字の文字クラス数

    positional_encoding:
      type: "learned"  # learned or sinusoidal
      max_sequence_length: 100

# 入力画像の設定
input:
  size: [224, 224]  # 入力画像サイズ
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# モデルの学習設定
training:
  optimizer:
    type: "AdamW"
    lr: 0.0001
    weight_decay: 0.0001
  
  scheduler:
    type: "CosineAnnealingLR"
    T_max: 100
    eta_min: 0.000001

  loss:
    type: "CrossEntropyLoss"
    label_smoothing: 0.1

# データ拡張設定
augmentation:
  train:
    - RandomRotation:
        degrees: [-10, 10]
    - RandomResizedCrop:
        size: [224, 224]
        scale: [0.8, 1.0]
    - RandomAffine:
        degrees: 0
        translate: [0.1, 0.1]
    - ColorJitter:
        brightness: 0.2
        contrast: 0.2
    - Normalize:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
  
  val:
    - Resize:
        size: [224, 224]
    - Normalize:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]